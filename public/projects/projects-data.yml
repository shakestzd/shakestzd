projects:
  pitchcasts:
    title: "Pitchcasts"
    subtitle: "Live 2026 World Cup forecasting with climate and travel adjustments"
    status: "production / live"
    featured: true
    date: "2026-06-23"
    impact: "Live public forecast with climate and travel adjustments, public scoring, and automated refresh"
    tech_stack:
      - "Python"
      - "FastAPI"
      - "NumPy"
      - "React"
      - "Vite"
      - "SQLite"
      - "dbt/DuckDB (offline analytics only)"
      - "Fly.io"
      - "Cloudflare Pages"
    categories:
      - "forecasting"
      - "sports-analytics"
      - "data-engineering"
    metrics:
      finished_matches_scored: 44
      top_probability_hits: 30
      brier_score: 0.492
    documentation_url: "https://pitchcasts.com"
    summary: "Built a live 2026 World Cup forecasting model using a Dixon-Coles bivariate Poisson core, climate and travel covariates, and a public Brier-scored evaluation loop."
    description: |
      Built a public forecasting app for the 2026 FIFA World Cup. Pitchcasts combines a Dixon-Coles bivariate Poisson goal model, documented environmental adjustments, and a live data pipeline to publish match probabilities and tournament outlooks.
    technical_details: |
      ### Forecasting Layer
      - Dixon-Coles bivariate Poisson goal model with draw-inflation mixture
      - Team strength from FIFA ranking history and recent friendly form in a 180-day exponentially decayed window
      - Documented covariates for altitude, wet-bulb heat, travel distance, time-zone change, and rest days
      - Adjustments softened for roofed and air-conditioned stadiums

      ### Evaluation and Operations
      - Multiclass Brier score with leave-future-out evaluation and kickoff cutoff
      - Walk-forward backtest over 49,000+ historical international results
      - FastAPI backend on Fly.io with React/Vite frontend on Cloudflare Pages
      - Live sync loop refreshing data roughly every 2 minutes during active match windows
    features:
      - "Live match probabilities and tournament outlooks"
      - "Documented environmental adjustment layer"
      - "Public model scorecard with Brier score and top-pick hit rate"
      - "Model card, model registry, and config-change gates"
      - "Cross-source verification around football-data.org ingest"
    results: |
      - Live throughout the 2026 World Cup group stage
      - Top pick correct in 30 of 44 finished group matches as of June 2026
      - 0.492 multiclass Brier score versus 0.667 equal-probability baseline as of June 2026

